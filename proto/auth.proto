syntax = "proto3";

package beehive.auth;

option go_package = "./services/auth/pb";

service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Register(RegisterRequest) returns (LoginResponse);
  rpc TokenLogin(TokenLoginRequest) returns (LoginResponse);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  // RBAC：查询用户系统级角色
  rpc GetUserRoles(GetUserRolesRequest) returns (GetUserRolesResponse);
  // RBAC：检查用户是否具备某个权限
  rpc CheckPermission(CheckPermissionRequest) returns (CheckPermissionResponse);
  // RBAC（可选，对内/管理用途）：为用户设置角色
  rpc AssignRoles(AssignRolesRequest) returns (AssignRolesResponse);
}

message LoginRequest {
  string username = 1;
  string password = 2;
  string device_id = 3;
}

message RegisterRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  string user_id = 1;
  string access_token = 2;
  string refresh_token = 3;
  int64 expires_in = 4;
}

message TokenLoginRequest {
  string access_token = 1;
  string device_id = 2;
}

message ValidateTokenRequest {
  string access_token = 1;
}

message ValidateTokenResponse {
  bool valid = 1;
  string user_id = 2;
}

message LogoutRequest {
  string access_token = 1;
}

message LogoutResponse {}

// RBAC：用户角色与权限

message GetUserRolesRequest {
  string user_id = 1;
}

message GetUserRolesResponse {
  repeated string roles = 1;
}

message CheckPermissionRequest {
  string user_id = 1;
  string permission = 2;
}

message CheckPermissionResponse {
  bool allowed = 1;
}

message AssignRolesRequest {
  string user_id = 1;
  // 完整覆盖式赋值：实现时建议先清空再写入
  repeated string roles = 2;
}

message AssignRolesResponse {}

