services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.15
    container_name: beehive-etcd
    restart: unless-stopped
    environment:
      ETCD_NAME: beehive-etcd
      ETCD_DATA_DIR: /etcd-data
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://beehive-etcd:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://beehive-etcd:2380
      ETCD_INITIAL_CLUSTER: beehive-etcd=http://beehive-etcd:2380
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: beehive-etcd-token
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - ../../data/etcd:/etcd-data
    networks:
      - beehive-net

networks:
  beehive-net:
    driver: bridge
